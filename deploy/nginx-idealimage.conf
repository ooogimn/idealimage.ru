# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name idealimage.ru www.idealimage.ru;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name idealimage.ru www.idealimage.ru;

    # SSL certificates (путь к сертификатам Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/idealimage.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/idealimage.ru/privkey.pem;
    
    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static files
    location /static/ {
        alias /var/www/idealimage/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media files
    location /media/ {
        alias /var/www/idealimage/media/;
        expires 1M;
        add_header Cache-Control "public";
        access_log off;
    }

    # Favicon and robots.txt
    location ~ ^/(favicon\.ico|robots\.txt|ads\.txt|sitemap\.xml)$ {
        alias /var/www/idealimage/;
        expires 1d;
        access_log off;
    }

    # Proxy to Gunicorn
    location / {
        proxy_pass http://unix:/run/idealimage.sock;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/idealimage/staticfiles/;
        internal;
    }
}
